<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watercolor Clock Widget</title>
    <style>
        /* 기본 (라이트 모드) 컬러: 싱그러운 연두색 수채화 */
   :root {
            --text-main: #4a3f3a; /* 따뜻한 다크 브라운 */
            --text-sub: #8c7b75;  /* 부드러운 코코아 회색 */
            --blob-1: #fff0e8;    /* 뽀얀 살구색 */
            --blob-2: #faddce;    /* 은은한 피치색 */
        }

        /* 다크 모드 컬러: 차분하고 깊은 숲색 수채화 */
        @media (prefers-color-scheme: dark) {
            :root {
                --text-main: #e6f0e7;
                --text-sub: #aabfab;
                --blob-1: #1e3622;
                --blob-2: #244229;
            }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none; /* 드래그 방지 */
        }

        .widget-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 300px;
            height: 300px;
        }

        /* --- 수채화 배경 효과 (CSS Blob) --- */
        .watercolor-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            z-index: -1;
        }

        /* 두 개의 유기적인 모양을 겹치고 블러처리하여 물감 번짐 표현 */
        .blob {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.85;
            filter: blur(12px);
        }

        .blob-1 {
            background-color: var(--blob-1);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            transform: rotate(15deg);
        }

        .blob-2 {
            background-color: var(--blob-2);
            border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%;
            transform: rotate(-25deg) scale(0.95);
        }

        /* --- 텍스트 스타일 --- */
        .greeting {
            font-size: 1rem;
            color: var(--text-sub);
            margin-bottom: 5px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .time {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1;
            letter-spacing: 0.02em;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .date {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <!-- 수채화 물감 효과 -->
        <div class="watercolor-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>
        
        <!-- 고정된 인삿말 -->
        <div class="greeting">Welcome to my workspace</div>
        
        <!-- 시계 정보 -->
        <div class="time" id="time">00:00</div>
        <div class="date" id="date">0000-00-00</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // 1. 시간 표시 (HH:MM 형식)
            const h = now.getHours();
            const m = now.getMinutes();
            const hours = String(h).padStart(2, '0');
            const minutes = String(m).padStart(2, '0');
            document.getElementById('time').innerText = `${hours}:${minutes}`;

            // 2. 날짜 표시 (YYYY-MM-DD 형식으로 변경)
            const y = now.getFullYear();
            const mo = String(now.getMonth() + 1).padStart(2, '0'); // 월은 0부터 시작하므로 +1
            const d = String(now.getDate()).padStart(2, '0');
            
            // 템플릿 리터럴 순서를 연-월-일로 변경
            document.getElementById('date').innerText = `${y}/${mo}/${d}`;
        }

        // 1초마다 업데이트
        setInterval(updateClock, 1000);
        updateClock(); // 초기 즉시 실행
    </script>
</body>
</html>
