<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watercolor Clock Widget</title>
    <style>
        /* 라이트 모드 컬러: 코지 베이지 (노션 템플릿 맞춤) */
     :root {
            --text-main: #37352f; /* 노션 기본 진한 텍스트 */
            --text-sub: #787774;  /* 노션 기본 회색 텍스트 */
            --blob-1: #faf3e6;    /* 아주 연한 크림색 */
            --blob-2: #f2e4c9;    /* 따뜻한 베이지색 */
            --watermark: #e0dfdc; /* 워터마크(서명) 색상: 아주 연한 회색 */
        }

        /* 다크 모드 컬러 */
        @media (prefers-color-scheme: dark) {
            :root {
                --text-main: #e6f0e7;
                --text-sub: #aabfab;
                --blob-1: #3b3a37; /* 다크모드에 맞는 딥 그레이지 */
                --blob-2: #2f2e2c;
                --watermark: #4a4947;
            }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .widget-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 300px;
            height: 300px;
        }

        /* 수채화 배경 효과 */
        .watercolor-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            z-index: -1;
        }

        .blob {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.85;
            filter: blur(12px);
        }

        .blob-1 {
            background-color: var(--blob-1);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            transform: rotate(15deg);
        }

        .blob-2 {
            background-color: var(--blob-2);
            border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%;
            transform: rotate(-25deg) scale(0.95);
        }

        /* 텍스트 스타일 */
        .greeting {
            font-size: 1rem;
            color: var(--text-sub);
            margin-bottom: 5px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .time {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-main);
            line-height: 1;
            letter-spacing: 0.02em;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .date {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        /* 하단 서명 (워터마크) 스타일 */
        .watermark {
            position: absolute;
            bottom: 20px; /* 맨 아래에서 살짝 위로 */
            font-size: 0.7rem;
            color: var(--watermark);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: lowercase; /* 소문자로 통일하여 미니멀함 강조 */
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <!-- 수채화 물감 효과 -->
        <div class="watercolor-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>
        
        <!-- 고정된 인삿말 -->
        <div class="greeting">Welcome to my workspace</div>
        
        <!-- 시계 정보 -->
        <div class="time" id="time">00:00</div>
        <div class="date" id="date">0000-00-00</div>

        <!-- 내 위젯 표시 (서명) -->
        <div class="watermark">nomadplanner</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            // 1. 시간 표시
            const h = now.getHours();
            const m = now.getMinutes();
            const hours = String(h).padStart(2, '0');
            const minutes = String(m).padStart(2, '0');
            document.getElementById('time').innerText = `${hours}:${minutes}`;

            // 2. 날짜 표시
            const y = now.getFullYear();
            const mo = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            document.getElementById('date').innerText = `${y}/${mo}/${d}`;
        }

        // 1초마다 업데이트
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
